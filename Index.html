<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untuk Ayu Putri Nadira</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f8f9fa;
            text-align: center;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.2);
            max-width: 500px;
            margin: auto;
        }

        h1 {
            font-size: 24px;
            color: #d6336c;
        }

        p {
            font-size: 18px;
            color: #333;
            transition: opacity 0.5s;
            padding: 15px;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            background: #ff69b4;
            color: white;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #d6336c;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Untuk Ayu Putri Nadira</h1>
        <p id="kataManis">"Aku ingin kita tetap bersama, melewati setiap waktu dengan cinta yang tetap hangat."</p>
        <button onclick="gantiKata()">Kata Selanjutnya</button>
    </div>

    <script>
        const kataKata = [
            "Aku ingin kita tetap bersama, melewati setiap waktu dengan cinta yang tetap hangat.",
            "Kamu adalah bagian terindah dalam hidupku, dan aku ingin selalu menjagamu.",
            "Bersamamu, aku merasa tenang. Kita tak perlu banyak kata, cukup saling memahami.",
            "Aku ingin tetap ada di sisimu, bukan hanya untuk hari ini, tapi selamanya.",
            "Cinta kita tidak harus sempurna, yang penting kita selalu memilih satu sama lain."
        ];

        let index = 0;

        function gantiKata() {
            index = (index + 1) % kataKata.length;
            const p = document.getElementById("kataManis");
            p.style.opacity = 0;
            setTimeout(() => {
                p.textContent = kataKata[index];
                p.style.opacity = 1;
            }, 500);
        }
    </script>
</body>
</html>
